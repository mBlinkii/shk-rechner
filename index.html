<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SHK Rechner</title>
<meta name="theme-color" content="#f7f6f3" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141417" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SHK Rechner">
<style>
  /* ---------- Reset ---------- */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  input::placeholder { color: var(--muted); opacity:.75; }
  input[type=number]::-webkit-inner-spin-button { opacity: 0.35; }
  button { font-family: inherit; }
  ::selection { background: var(--accentSoft); }

  /* ---------- Theme-Variablen (Hell als Standard) ---------- */
  :root {
    --bg:#f7f6f3; --bgT:rgba(247,246,243,.82); --surface:#ffffff; --text:#1b1a18; --muted:#6e6a64;
    --border:#e7e3dd; --field:#ffffff; --fieldBorder:#d9d5ce;
    --chip:#edeae5; --chipActive:#ffffff; --result:#f2f0ec;
    --accent:oklch(0.55 0.13 245); --accent2:oklch(0.47 0.13 252);
    --accentSoft:oklch(0.55 0.13 245 / .13); --accentBorder:oklch(0.78 0.07 245);
    --ring:0 0 0 3px oklch(0.55 0.13 245 / .20);
    --shadow-sm:0 1px 2px rgba(30,26,20,.05), 0 1px 5px rgba(30,26,20,.04);
    --shadow:0 12px 32px rgba(30,26,20,.10), 0 3px 9px rgba(30,26,20,.05);
    --shadow-accent:0 10px 26px oklch(0.55 0.13 245 / .28);
  }
  /* Dunkel via [data-theme="dark"] */
  [data-theme="dark"] {
    --bg:#141417; --bgT:rgba(20,20,23,.78); --surface:#1d1d22; --text:#eeedf0; --muted:#9c9ba4;
    --border:#2a2a31; --field:#202027; --fieldBorder:#35353e;
    --chip:#242429; --chipActive:#3b3b45; --result:#202027;
    --accent:oklch(0.66 0.13 245); --accent2:oklch(0.56 0.13 252);
    --accentSoft:oklch(0.66 0.13 245 / .18); --accentBorder:oklch(0.5 0.08 245);
    --ring:0 0 0 3px oklch(0.66 0.13 245 / .28);
    --shadow-sm:0 1px 2px rgba(0,0,0,.25);
    --shadow:0 12px 32px rgba(0,0,0,.45), 0 3px 9px rgba(0,0,0,.3);
    --shadow-accent:0 10px 26px oklch(0.66 0.13 245 / .22);
  }

  body {
    min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.45;
    transition:background .25s,color .25s;
  }
  .wrap { max-width:840px; margin:0 auto; padding:0 24px 70px 24px; }
  .tool-wrap { max-width:560px; margin:26px auto 0 auto; }

  /* Sichtbarer Tastatur-Fokus */
  :where(button, summary):focus-visible { outline:none; box-shadow:var(--ring); border-radius:9px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition:none !important; animation:none !important; }
  }

  /* ---------- Header (schwebend) ---------- */
  .header {
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    position:sticky; top:0; z-index:10; padding:20px 8px 14px 8px; margin:0 -8px;
    background:var(--bgT); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .logo { cursor:pointer; display:flex; align-items:baseline; gap:11px; background:none; border:none; padding:0; }
  .logo-dot { width:11px; height:11px; border-radius:3.5px; background:var(--accent); display:inline-block; box-shadow:0 0 0 4px var(--accentSoft); }
  .logo-text { font-size:21px; font-weight:700; letter-spacing:-0.02em; color:var(--text); }
  .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
  .seg { display:flex; background:var(--chip); border-radius:999px; padding:3px; box-shadow:inset 0 1px 2px rgba(0,0,0,.04); }
  .seg-btn {
    font-size:13px; font-weight:600; padding:7px 16px; border-radius:999px;
    cursor:pointer; transition:all .18s ease; border:none; background:transparent; color:var(--muted);
  }
  .seg-btn:focus-visible { border-radius:999px; }
  .seg-btn.active { color:var(--text); background:var(--chipActive); box-shadow:0 1px 3px rgba(0,0,0,.10); }
  [data-theme="dark"] .seg-btn.active { color:#fff; }

  .icon-btn {
    border:1px solid var(--border); background:var(--surface); color:var(--muted);
    border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer;
    transition:all .18s ease; box-shadow:var(--shadow-sm);
  }
  .icon-btn:hover { color:var(--text); border-color:var(--accentBorder); transform:translateY(-1px); }
  .icon-btn:focus-visible { border-radius:999px; }

  /* ---------- Home ---------- */
  .subtitle { font-size:15px; color:var(--muted); margin-top:14px; }
  .search {
    display:flex; align-items:center; gap:12px; margin-top:22px;
    background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:13px 20px;
    box-shadow:var(--shadow-sm); transition:border-color .18s, box-shadow .18s;
  }
  .search:focus-within { border-color:var(--accent); box-shadow:var(--ring); }
  .search-ring { position:relative; width:13px; height:13px; border:2px solid var(--muted); border-radius:50%; flex-shrink:0; }
  .search-ring::after { content:''; position:absolute; width:2px; height:6px; background:var(--muted); border-radius:2px; transform:rotate(-45deg); right:-3px; bottom:-5px; }
  .search input { border:none; outline:none; background:transparent; font-size:15px; color:var(--text); width:100%; font-family:inherit; }

  .group { margin-top:30px; }
  .group-head {
    display:flex; align-items:center; gap:10px; margin-bottom:14px; margin-left:-8px;
    width:calc(100% + 16px); padding:6px 8px; background:none; border:none; cursor:pointer;
    text-align:left; border-radius:10px; transition:background .15s ease;
  }
  .group-head:hover { background:var(--chip); }
  .group-head:hover .group-label { color:var(--text); }
  .group-head:focus-visible { border-radius:10px; }
  .group-head.collapsed { margin-bottom:2px; }
  .group-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .group-label { font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); transition:color .15s; }
  .group-count { font-size:11px; font-weight:650; color:var(--muted); background:var(--chip); border:1px solid var(--border); border-radius:999px; padding:1px 8px; font-variant-numeric:tabular-nums; }
  .group-head:hover .group-count { background:var(--surface); }
  .group-chev { margin-left:auto; color:var(--muted); font-size:13px; line-height:1; transition:transform .18s ease; }
  .group-head.collapsed .group-chev { transform:rotate(-90deg); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:560px){ .grid { grid-template-columns:1fr; } }
  .card {
    position:relative; overflow:hidden;
    background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:19px 20px 17px 20px;
    cursor:pointer; text-align:left; box-shadow:var(--shadow-sm);
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--cat, var(--accent)); opacity:0; transition:opacity .16s ease;
  }
  .card:hover, .card:focus-visible { box-shadow:var(--shadow); transform:translateY(-2px); border-color:var(--accentBorder); }
  .card:hover::before, .card:focus-visible::before { opacity:1; }
  .card:focus-visible { border-radius:14px; box-shadow:var(--shadow), var(--ring); }
  .card-name { font-size:16.5px; font-weight:650; letter-spacing:-0.01em; color:var(--text); }
  .card-desc { font-size:13.5px; color:var(--muted); margin-top:5px; line-height:1.5; }
  .no-results { margin-top:40px; text-align:center; color:var(--muted); font-size:15px; }
  .footer-note { text-align:center; font-size:12px; color:var(--muted); margin-top:52px; opacity:.8; }
  .app-save-wrap { text-align:center; margin-top:14px; }
  .app-save {
    border:1px solid var(--border); background:var(--surface); color:var(--muted);
    border-radius:999px; padding:9px 18px; font-size:13px; font-weight:600; cursor:pointer;
    transition:all .18s ease; box-shadow:var(--shadow-sm);
  }
  .app-save:hover { color:var(--accent); border-color:var(--accentBorder); transform:translateY(-1px); }
  .app-save:focus-visible { border-radius:999px; }
  .home-hint { max-width:560px; margin:16px auto 0 auto; }
  .hint-step { margin-top:12px; }
  .hint-step:first-child { margin-top:2px; }
  .hint-step strong { display:block; font-size:13px; color:var(--text); margin-bottom:3px; }

  /* ---------- Tool ---------- */
  .back { display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:14px; font-weight:500; color:var(--muted); background:none; border:none; padding:2px 4px; margin-left:-4px; border-radius:8px; transition:color .15s; }
  .back:hover { color:var(--text); }
  .back .chev { font-size:17px; line-height:1; transition:transform .15s ease; }
  .back:hover .chev { transform:translateX(-2px); }
  .tool-top { display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .tool-cat { display:flex; align-items:center; gap:9px; margin-top:20px; }
  .tool-cat-dot { width:9px; height:9px; border-radius:50%; }
  .tool-cat-label { font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
  .tool-name { font-size:29px; font-weight:700; letter-spacing:-0.02em; color:var(--text); margin-top:9px; line-height:1.15; }
  .tool-desc { font-size:15px; color:var(--muted); margin-top:7px; line-height:1.55; }
  .tool-explain { margin-top:18px; border:1px solid var(--border); border-radius:12px; background:var(--surface); box-shadow:var(--shadow-sm); }
  .tool-explain summary { cursor:pointer; padding:12px 16px; font-size:13.5px; font-weight:600; color:var(--text); list-style:none; user-select:none; border-radius:12px; }
  .tool-explain summary::-webkit-details-marker { display:none; }
  .tool-explain summary::before { content:'▸'; display:inline-block; margin-right:9px; color:var(--accent); transition:transform .18s ease; }
  .tool-explain[open] summary::before { transform:rotate(90deg); }
  .tool-explain-body { padding:0 16px 15px 16px; font-size:13.5px; color:var(--muted); line-height:1.65; }

  .fields { display:flex; flex-direction:column; gap:18px; margin-top:28px; }
  .field { display:flex; flex-direction:column; gap:8px; }
  .field-head { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .field-label { font-size:14px; font-weight:600; color:var(--text); }
  .field-unit { font-size:12.5px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .field input, .field select {
    width:100%; padding:12px 15px; font-size:16px; border:1px solid var(--fieldBorder);
    border-radius:11px; background:var(--field); color:var(--text); outline:none; font-family:inherit;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field select { cursor:pointer; }
  .field input:hover, .field select:hover { border-color:var(--accentBorder); }
  .field input:focus, .field select:focus { border-color:var(--accent); box-shadow:var(--ring); }

  /* dynamische Abschnitte (Rohrvolumen, Heizlast) */
  .rohr-section { border:1px solid var(--border); border-radius:13px; background:var(--surface); padding:14px 16px; box-shadow:var(--shadow-sm); }
  .rohr-section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .rohr-section-title { font-size:12px; font-weight:700; letter-spacing:0.06em; color:var(--muted); text-transform:uppercase; }
  .rohr-remove { border:none; background:transparent; color:var(--muted); font-size:13px; cursor:pointer; padding:2px 6px; border-radius:7px; transition:color .15s, background .15s; }
  .rohr-remove:hover { color:var(--accent); background:var(--accentSoft); }
  .rohr-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .hz-row { display:grid; grid-template-columns:2fr 1fr; gap:12px; }
  .rohr-add { width:100%; padding:13px; border:1.5px dashed var(--fieldBorder); border-radius:12px; background:transparent; color:var(--muted); font-size:14.5px; font-weight:600; cursor:pointer; transition:all .18s ease; }
  .rohr-add:hover { border-color:var(--accent); color:var(--accent); background:var(--accentSoft); }

  .result-block { margin-top:30px; }
  .result-main {
    background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff;
    border-radius:16px; padding:22px 24px; box-shadow:var(--shadow-accent);
  }
  .result-main-label { font-size:13px; font-weight:600; opacity:.9; letter-spacing:0.01em; }
  .result-main-row { display:flex; align-items:baseline; gap:9px; margin-top:8px; flex-wrap:wrap; }
  .result-main-value { font-size:40px; font-weight:700; letter-spacing:-0.02em; line-height:1.05; font-variant-numeric:tabular-nums; }
  .result-main-unit { font-size:19px; font-weight:600; opacity:.85; }
  .result-subs { display:flex; flex-direction:column; gap:1px; margin-top:16px; border-radius:13px; overflow:hidden; border:1px solid var(--border); background:var(--border); box-shadow:var(--shadow-sm); }
  .result-sub { display:flex; justify-content:space-between; align-items:baseline; gap:14px; background:var(--surface); padding:13px 18px; }
  .result-sub-label { font-size:14px; color:var(--muted); }
  .result-sub-value { font-size:15.5px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--text); text-align:right; }
  .result-note { font-size:13px; color:var(--muted); margin-top:16px; line-height:1.65; padding:0 2px; }
  .result-ref-title { font-size:11.5px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-top:26px; margin-bottom:10px; padding-left:2px; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
"use strict";
(function () {
  /* =========================================================
     SHK Rechner — eigenständig, offline, ohne Abhängigkeiten.
     Reines Vanilla-JS. Persistenz über localStorage (+ JSON-Export/-Import).
     ========================================================= */

  // ---------- Kategorien ----------
  var cats = {
    heizung:  { label: 'Heizung',           dot: 'oklch(0.62 0.15 40)' },
    wp:       { label: 'Wärmepumpe',        dot: 'oklch(0.6 0.13 300)' },
    solar:    { label: 'Solar',             dot: 'oklch(0.78 0.15 85)' },
    sanitaer: { label: 'Sanitär',           dot: 'oklch(0.6 0.11 235)' },
    allg:     { label: 'Klima & Allgemein', dot: 'oklch(0.62 0.08 175)' }
  };

  // ---------- Werkzeuge ----------
  var TOOLS = [
    { id:'mag',         cat:'heizung',  name:'Ausdehnungsgefäß',          desc:'MAG-Volumen für Heizungsanlagen auslegen.' },
    { id:'leistung',    cat:'heizung',  name:'Volumenstrom aus Leistung', desc:'Volumenstrom aus kW und Spreizung Δt ermitteln.' },
    { id:'leistungaus', cat:'heizung',  name:'Leistung aus Volumenstrom', desc:'kW aus Volumenstrom und Spreizung Δt ermitteln.' },
    { id:'heizkoerper', cat:'heizung',  name:'Heizkörper-Umrechnung',     desc:'Norm-Leistung auf andere Systemtemperaturen.' },
    { id:'hkleistung',  cat:'heizung',  name:'Heizkörper-Leistung',       desc:'Leistung aus Bauart und Maßen für verschiedene Systemtemperaturen.' },
    { id:'gas',         cat:'heizung',  name:'Gasverbrauch',              desc:'Gasdurchfluss eines Brenners aus Leistung und Heizwert.' },
    { id:'oelduese',    cat:'heizung',  name:'Öldüsen-Auswahl',           desc:'Düsengröße in gph aus Kesselleistung und Pumpendruck.' },
    { id:'abgas',       cat:'heizung',  name:'Abgasverlust',              desc:'Abgasverlust und Wirkungsgrad nach Siegert-Formel.' },
    { id:'oelreich',    cat:'heizung',  name:'Heizöl-Reichweite',         desc:'Ölverbrauch und Tankreichweite aus Düse und Brennerlaufzeit.' },
    { id:'fuellwasser', cat:'heizung',  name:'Füllwasser (VDI 2035)',     desc:'Muss das Heizungsfüllwasser enthärtet werden?' },
    { id:'aufheiz',     cat:'sanitaer', name:'Speicher-Aufheizzeit',      desc:'Aufheizdauer eines Speichers aus Inhalt und Ladeleistung.' },
    { id:'mischwasser', cat:'sanitaer', name:'Mischwasser-Menge',         desc:'Wie viel 38-°C-Wasser liefert der Speicher?' },
    { id:'ausstoss',    cat:'sanitaer', name:'Ausstoßzeit Warmwasser',    desc:'Wartezeit bis warmes Wasser an der Zapfstelle ankommt.' },
    { id:'spitzenvs',   cat:'sanitaer', name:'Spitzendurchfluss',         desc:'Spitzenvolumenstrom mit Gleichzeitigkeit (DIN 1988-300).' },
    { id:'druckpruef',  cat:'sanitaer', name:'Dichtheitsprüfung',         desc:'Prüfdruck und -dauer für Trinkwasserleitungen.' },
    { id:'lueftung',    cat:'allg',     name:'Lüftungs-Volumenstrom',     desc:'Erforderlicher Luftvolumenstrom je Raumtyp.' },
    { id:'kaeltemittel',cat:'allg',     name:'Kältemittel / CO₂-Äquiv.',  desc:'CO₂-Äquivalent und Dichtheitsprüfpflicht (F-Gase).' },
    { id:'kondensat',   cat:'heizung',  name:'Kondensatmenge',            desc:'Kondensatanfall eines Brennwertgeräts pro Stunde.' },
    { id:'pumpe',       cat:'heizung',  name:'Pumpe / Förderhöhe',        desc:'Volumenstrom und Förderhöhe für den Heizkreis abschätzen.' },
    { id:'fbhdurch',    cat:'heizung',  name:'Fußboden-Durchfluss',       desc:'Durchflussmenge einer Fußbodenheizung aus Fläche und Baualter.' },
    { id:'heizlast',    cat:'heizung',  name:'Heizlast (Überschlag)',     desc:'Heizleistung je Raum und gesamt nach Fläche und Baualter.' },
    { id:'sv',          cat:'heizung',  name:'Sicherheitsventil',         desc:'Mindest-Anschlussgröße nach Kesselleistung (DIN EN 12828).' },
    { id:'solarmag',    cat:'solar',    name:'Solar-Ausdehnungsgefäß',    desc:'MAG-Volumen für Solaranlagen inkl. Stagnation auslegen.' },
    { id:'frost',       cat:'solar',    name:'Frostschutz-Mischung',      desc:'Glykolanteil für gewünschten Frostschutz.' },
    { id:'rohrvol',     cat:'sanitaer', name:'Rohrvolumen',               desc:'Wasserinhalt nach Durchmesser und Länge.' },
    { id:'gefaelle',    cat:'sanitaer', name:'Rohrgefälle',               desc:'Abwassergefälle in % und cm/m.' },
    { id:'twmag',       cat:'sanitaer', name:'Trinkwasser-MAG',           desc:'Ausdehnungsgefäß am Wassererwärmer nach DIN 4807-5.' },
    { id:'wtdurch',     cat:'sanitaer', name:'Wärmetauscher-Durchfluss',  desc:'Durchflussmenge am Wärmetauscher eines Speicherladesystems.' },
    { id:'taupunkt',    cat:'allg',     name:'Taupunkt',                  desc:'Taupunkt und Kondensatrisiko ermitteln.' },
    { id:'einheiten',   cat:'allg',     name:'Einheiten-Umrechner',       desc:'Druck, Leistung, Temperatur, Durchfluss.' },
    { id:'mwst',        cat:'allg',     name:'MwSt & Angebot',            desc:'Netto, Brutto und Aufschlag berechnen.' },
    { id:'cop',         cat:'wp',       name:'COP-Schätzung',             desc:'COP aus Quellen- und Vorlauftemperatur abschätzen.' },
    { id:'jaz',         cat:'wp',       name:'JAZ & Wirtschaftlichkeit',  desc:'Betriebskosten Wärmepumpe vs. Gas/Öl vergleichen.' },
    { id:'bivalenz',    cat:'wp',       name:'Bivalenzpunkt / Heizstab',  desc:'Bivalenztemperatur und Zuheizer-Leistung ermitteln.' },
    { id:'puffer',      cat:'wp',       name:'Pufferspeicher',            desc:'Puffervolumen einer Wärmepumpe nach Leistung.' },
    { id:'schall',      cat:'wp',       name:'Schallabstand',             desc:'Mindestabstand der Außeneinheit nach Schallpegel.' },
    { id:'heizkurve',   cat:'wp',       name:'Heizkurve / Vorlauf',       desc:'Erforderliche Vorlauftemperatur je Außentemperatur.' },
    { id:'abgleich',    cat:'heizung',  name:'Hydraulischer Abgleich',    desc:'Volumenstrom und kv-Wert je Heizkörper.' },
    { id:'wwspeicher',  cat:'sanitaer', name:'Warmwasser-Speicher',       desc:'Speichergröße nach Personenzahl und Komfort.' },
    { id:'rohrdim',     cat:'allg',     name:'Rohrdimensionierung',       desc:'Rohrdurchmesser aus Volumenstrom und Geschwindigkeit.' }
  ];

  // ---------- Kurzerklärung je Werkzeug (eingeklappt) ----------
  var EXPLAIN = {
    mag:        'Berechnet das nötige Volumen des Membran-Ausdehnungsgefäßes (MAG) einer Heizung, damit es die temperaturbedingte Ausdehnung des Heizwassers aufnimmt. Eingaben: Wasserinhalt, max. Vorlauftemperatur, statische Höhe und Ansprechdruck des Sicherheitsventils.',
    leistung:   'Rechnet Heizleistung (kW) und Spreizung Δt in den nötigen Volumenstrom um. Grundlage: V = Q × 860 / Δt.',
    leistungaus:'Umkehrung: ermittelt aus gemessenem Volumenstrom und der Spreizung Δt die übertragene Leistung in kW.',
    heizkoerper:'Rechnet die Norm-Heizleistung eines Heizkörpers (Bezug 75/65/20) auf andere Systemtemperaturen um — z. B. für niedrigere Vorlauftemperaturen bei Wärmepumpen.',
    hkleistung: 'Schätzt die Wärmeleistung eines Heizkörpers aus Bauart und Maßen und zeigt sie für mehrere Systemtemperaturen.',

  // ---------- Persistenz ----------
  function loadState() {
    try {
      var t = localStorage.getItem('shk.theme');
      var v = localStorage.getItem('shk.vals');
      if (t === 'light' || t === 'dark') {
        state.theme = t;
        themeChosen = true;
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        // Systemeinstellung respektieren, wenn nichts gespeichert ist
        state.theme = 'dark';
      }
      if (v) { var p = JSON.parse(v); if (p && typeof p === 'object') state.vals = p; }
      var co = localStorage.getItem('shk.collapsed');
      if (co) { var pc = JSON.parse(co); if (pc && typeof pc === 'object') state.collapsed = pc; }
    } catch (e) {}
  }
  function persist() {
    try {
      // Theme nur speichern, wenn explizit gewählt — sonst folgt es der Systemeinstellung
      if (themeChosen) localStorage.setItem('shk.theme', state.theme);
      localStorage.setItem('shk.vals', JSON.stringify(state.vals));
      localStorage.setItem('shk.collapsed', JSON.stringify(state.collapsed));
    } catch (e) {}
  }

  // ---------- Hilfsfunktionen ----------
  function P(x)  { var f = parseFloat(String(x).replace(',', '.')); return isFinite(f) ? f : 0; }
  function fmt(n, d) {
    if (d == null) d = 2;
    return isFinite(n) ? n.toLocaleString('de-DE', { minimumFractionDigits:d, maximumFractionDigits:d }) : '–';
  }
  function f2(n) {
    if (!isFinite(n)) return '–';
    var a = Math.abs(n);
    var d = a >= 100 ? 2 : a >= 1 ? 3 : a > 0 ? 4 : 2;
    return n.toLocaleString('de-DE', { maximumFractionDigits:d });
  }
  function interp(t, x) {
    if (x <= t[0][0]) return t[0][1];
    var n = t.length;
    if (x >= t[n-1][0]) return t[n-1][1];
    for (var i = 1; i < n; i++) {
      if (x <= t[i][0]) { var x1=t[i-1][0], y1=t[i-1][1], x2=t[i][0], y2=t[i][1]; return y1 + (y2-y1)*(x-x1)/(x2-x1); }
    }
    return t[n-1][1];
  }
  function pctFor(T) {
    var tab = frostTable;
    if (T >= 0) return 0;
    for (var i = 1; i < tab.length; i++) {
      var p1=tab[i-1][0], fl=tab[i-1][1], p2=tab[i][0], f2_=tab[i][1];
      if (T <= fl && T >= f2_) { var r = (fl - T) / (fl - f2_); return p1 + r*(p2-p1); }
    }
    return tab[tab.length-1][0];
  }

    for (k in d) out[k] = d[k];
    var v = state.vals[id] || {};
    for (k in v) out[k] = v[k];
    return out;
  }

  // ---------- Berechnungen ----------
  function computeFor(id, ev) {
    switch (id) {
      case 'mag': {
        var vol=P(ev.vol), tmax=P(ev.tmax), hstat=P(ev.hstat), psv=P(ev.psv);
        var n = interp(Etable, tmax);
        var Ve = vol*n, Vv = Math.max(vol*0.005, 3);
        var p0 = hstat/10 + 0.2; if (p0 < 0.5) p0 = 0.5;
        var pa = p0 + 0.3;                          // empfohlener Anlagenfülldruck (kalt)
        var pe = psv <= 5 ? psv*0.9 : psv-0.5;
        var valid = pe > p0;                        // Enddruck muss über dem Vordruck liegen
        var Vn = valid ? (Ve+Vv)*(pe+1)/(pe-p0) : NaN;
        var sizes = [8,12,18,25,35,50,80,100,140,200,250,300,400,500,600,800,1000];
        var size = isFinite(Vn) ? sizes.find(function(s){return s >= Vn;}) : null;
        return { main:{label:'Empfohlenes Ausdehnungsgefäß', value: size ? String(size) : (isFinite(Vn) ? '> '+sizes[sizes.length-1] : '–'), unit:'l'},
          subs:[
            {label:'Berechnetes Nennvolumen', value:fmt(Vn,1)+' l'},
            {label:'Ausdehnungsvolumen', value:fmt(Ve,1)+' l'},
            {label:'Wasservorlage', value:fmt(Vv,1)+' l'},
            {label:'Vordruck p₀', value:fmt(p0,2)+' bar'},
            {label:'Empfohlener Fülldruck p_a', value:fmt(pa,2)+' bar'},
            {label:'Enddruck pₑ', value:fmt(pe,2)+' bar'}
          ],
          note: (!valid ? 'Eingaben prüfen: Enddruck pₑ muss über dem Vordruck p₀ liegen — Sicherheitsventil mit höherem Ansprechdruck wählen oder statische Höhe prüfen. ' : '')
            + (isFinite(Vn) && !size ? 'Über 1000 l Nennvolumen: mehrere Gefäße parallel schalten oder eine Druckhaltestation (Kompressor- bzw. Pumpendruckhaltung) vorsehen. ' : '')
            + 'Orientierungswerte nach DIN EN 12828. Vordruck p₀ = statische Höhe / 10 + 0,2 bar; empfohlener Anlagenfülldruck p_a = p₀ + 0,3 bar (kalt, vor dem Aufheizen).' };
      }
      case 'leistung': {
        var Pk=P(ev.leistung), dt=P(ev.dt);
        var V = dt > 0 ? Pk*860/dt : NaN;
        return { main:{label:'Volumenstrom', value:fmt(V,0), unit:'l/h'},
          subs:[
            {label:'Volumenstrom', value:fmt(V/60,2)+' l/min'},
            {label:'Volumenstrom', value:fmt(V/1000,3)+' m³/h'},
            {label:'Heizleistung', value:fmt(Pk,2)+' kW'},
            {label:'Spreizung Δt', value:fmt(dt,1)+' K'}
          ],
          note:'Formel: V = Q × 860 / Δt (Wasser, c = 1,163 Wh/kg·K).',
          refTitle:'Übliche Spreizungen Δt', refs:SPREIZUNGEN };
      }
      case 'leistungaus': {
        var Vin=P(ev.vstrom);
        var Vh = ev.veinheit === 'l/min' ? Vin*60 : ev.veinheit === 'm³/h' ? Vin*1000 : Vin;   // Eingabe → l/h
        var dt2=P(ev.dt);
        var Qk = Vh*dt2/860;            // kW
        return { main:{label:'Heizleistung', value:fmt(Qk,2), unit:'kW'},
          subs:[
            {label:'Heizleistung', value:fmt(Qk*1000,0)+' W'},
            {label:'Heizleistung', value:fmt(Qk*860,0)+' kcal/h'},
            {label:'Volumenstrom', value:fmt(Vh,0)+' l/h'},
            {label:'Volumenstrom', value:fmt(Vh/60,2)+' l/min'},
            {label:'Spreizung Δt', value:fmt(dt2,1)+' K'}
          ],
          note:'Formel: Q = V × Δt / 860 (Wasser, c = 1,163 Wh/kg·K). Umkehrung von „Volumenstrom aus Leistung".',
          refTitle:'Übliche Spreizungen Δt', refs:SPREIZUNGEN };
      }
      case 'heizkoerper': {
        var pn=P(ev.pnorm), vl=P(ev.vl), rl=P(ev.rl), tr=P(ev.tr), nn=P(ev.n)||1.3;
        var A=vl-tr, B=rl-tr, dtlog;
        if (A>0 && B>0 && A!==B) dtlog=(vl-rl)/Math.log(A/B);
        else if (A>0 && A===B) dtlog=A; else dtlog=NaN;
        var dtnorm=49.83;
        var f = isFinite(dtlog) ? Math.pow(dtlog/dtnorm, nn) : NaN;
        var Pa = pn*f;
        return { main:{label:'Tatsächliche Wärmeleistung', value:fmt(Pa,0), unit:'W'},
          subs:[
            {label:'Korrekturfaktor f', value:fmt(f,3)},
            {label:'Übertemperatur Δt', value:fmt(dtlog,1)+' K'},
            {label:'Norm-Δt (75/65/20)', value:'49,8 K'},
            {label:'Normleistung', value:fmt(pn,0)+' W'}
          ],
          note:'Der Heizkörper-Exponent n beschreibt, wie stark die Wärmeleistung von der Übertemperatur abhängt: Q = Q_norm × (Δt/Δt_norm)ⁿ. Je größer n, desto stärker fällt die Leistung bei niedriger Vorlauftemperatur. Ermittlung aus dem Datenblatt mit zwei Leistungsangaben bei zwei Spreizungen: n = ln(Q₁/Q₂) / ln(Δt₁/Δt₂). Die Typ-Auswahl oben trägt nur einen Richtwert ein — der exakte Wert steht im Herstellerdatenblatt.',
          refTitle:'Typische Exponenten n', refs:[
            {label:'Plattenheizkörper', value:'1,30'},
            {label:'Stahlradiator',     value:'1,30'},
            {label:'Gussradiator',      value:'1,30'},
            {label:'Konvektor',         value:'1,40'},
            {label:'Fußbodenheizung',   value:'1,10'}
          ] };
      }
      case 'hkleistung': {
        var hoehe=P(ev.hoehe), laenge=P(ev.laenge);
        var Qnorm, nExp, info;
        if (ev.bauart === 'platte') {
          var q600 = PANEL_Q600[ev.ptyp] || PANEL_Q600['22'];
          // Norm-Leistung 75/65/20: spez. Leistung × Länge × Höhen-Korrektur (Bezug 600 mm)
          Qnorm = (laenge/1000) * q600 * Math.pow(hoehe/600, 0.7);
          nExp = 1.30;
          info = 'Plattenheizkörper Typ ' + ev.ptyp;
        } else {
          var tiefe=P(ev.tiefe);
          var k = RAD_K[ev.bauart] || RAD_K.stahl;
          // Norm-Leistung über Frontfläche × Bautiefe × Wärmedichte
          Qnorm = (hoehe/1000) * (laenge/1000) * tiefe * k;
          nExp = 1.30;
          info = (ev.bauart === 'guss' ? 'Gussradiator' : 'Stahlradiator');
        }
        var subs = HK_TEMPSETS.map(function(s){
          var vl=s[0], rl=s[1], tr=20;
          var A=vl-tr, B=rl-tr;
          var dl = (A>0 && B>0 && A!==B) ? (vl-rl)/Math.log(A/B) : (A>0?A:NaN);
          var fac = isFinite(dl) ? Math.pow(dl/49.83, nExp) : NaN;
          var W = Qnorm*fac;
          return { label: vl+'/'+rl+'/20 °C  (Δt '+fmt(dl,1)+' K)', value: fmt(W,0)+' W' };
        });
        return { main:{label:'Norm-Leistung 75/65/20 (ΔT 50 K)', value:fmt(Qnorm,0), unit:'W'},
          subs: subs,
          note:'Richtwert-Schätzung für '+info+' (Exponent n='+fmt(nExp,2)+'). Plattenheizkörper aus spez. Leistung × Länge × (Höhe/600)^0,7; Gliederheizkörper aus Frontfläche × Bautiefe × Wärmedichte. Genaue Werte bitte dem Herstellerdatenblatt entnehmen.' };
      }
      case 'heizlast': {
        var hl = ensureHeizlast();
        var std = STANDARDS.find(function(s){ return s.id === hl.standard; }) || STANDARDS[2];
        var hf = P(hl.hoehe) > 0 ? P(hl.hoehe)/2.5 : 1;   // Korrektur auf Bezugshöhe 2,5 m
        var specEff = std.w * hf;
        var total=0, totalA=0, subs=[];
        hl.rooms.forEach(function(r, i){
          var a=P(r.flaeche); var w=a*specEff;
          total+=w; totalA+=a;
          subs.push({ label:(r.name||('Raum '+(i+1)))+' ('+fmt(a,1)+' m²)', value:fmt(w,0)+' W' });
        });
        subs.push({ label:'Gesamtfläche', value:fmt(totalA,1)+' m²' });
        subs.push({ label:'spezifische Heizlast', value:fmt(specEff,0)+' W/m²' });
        subs.push({ label:'Gesamt-Heizlast', value:fmt(total,0)+' W' });
        return { main:{label:'Gesamt-Heizlast', value:fmt(total/1000,2), unit:'kW'},
          subs:subs,
          note:'Überschlag nach spezifischer Heizlast (W/m²) je Gebäudestandard — Anhaltswerte, bezogen auf 2,5 m Raumhöhe. Die genaue Heizlast wird raumweise nach DIN EN 12831 ermittelt (Bauteile, Fenster, Lüftung, Wärmebrücken). Für die ganze Wohnung alle Räume eintragen, für einen einzelnen Raum nur diesen.' };
      }
      case 'sv': {
        var Q=P(ev.leistung), hstat=P(ev.hstat);
        var auto = ev.psv === 'auto';
        // Druckkette nach DIN EN 12828
        var pstat = hstat/10;
        var p0 = Math.max(pstat + 0.2, 0.5);        // MAG-Vordruck
        var pa = p0 + 0.3;                          // Anlagenfülldruck (kalt)
        var peMin = pa + 0.5;                       // erforderlicher Enddruck mit Reserve
        var psvMin = peMin / 0.9;                   // Schließdruckdifferenz 10 %
        var stdP = [2.5,3.0,4.0,5.0,6.0];
        var psvCalc = stdP.find(function(p){ return p >= psvMin; }) || Math.ceil(psvMin*10)/10;
        var psv = auto ? psvCalc : P(ev.psv);
        var pe = psv<=5 ? psv*0.9 : psv-0.5;        // max. Betriebsdruck (Schließdruck)
        var valves=[
          {dn:'DN 15', conn:'½" × ¾"',  kw:50},
          {dn:'DN 20', conn:'¾" × 1"',  kw:100},
          {dn:'DN 25', conn:'1" × 1¼"', kw:200},

          subs:[
            {label:'Volumenstrom', value:fmt(VhL/3.6,1)+' l/s'},
            {label:'Raumvolumen', value:fmt(raumVol,1)+' m³'},
            {label:'Luftwechsel ('+rL.label+')', value:fmt(rL.n,1)+' 1/h'},
            {label:'Kanal-Ø bei 3 m/s', value:fmt(dKan,0)+' mm → DN '+(kSel||'> 400')}
          ],
          note:'Volumenstrom = Raumvolumen × Luftwechselrate (Richtwerte). Wohnungslüftung genau nach DIN 1946-6 auslegen; innenliegende Bäder/WCs nach DIN 18017-3 (pauschal 40 bzw. 60 m³/h). Kanalgeschwindigkeit in Wohnräumen möglichst ≤ 3 m/s (Geräusch).' };
      }
      case 'kaeltemittel': {
        var kmK = KAELTEMITTEL[ev.mittel] || KAELTEMITTEL.r32;
        var kgK = P(ev.menge);
        var teq = kgK*kmK.gwp/1000;                 // t CO₂-Äquivalent
        var pflicht;
        if (teq >= 500) pflicht = 'vierteljährlich (mit Leckage-Erkennung: halbjährlich)';
        else if (teq >= 50) pflicht = 'halbjährlich (mit Leckage-Erkennung: jährlich)';
        else if (teq >= 5) pflicht = 'jährlich (mit Leckage-Erkennung: alle 2 Jahre)';
        else pflicht = 'keine regelmäßige Prüfpflicht';
        return { main:{label:'CO₂-Äquivalent', value:fmt(teq,2), unit:'t'},
          subs:[
            {label:'Dichtheitsprüfung', value:pflicht},
            {label:'GWP ('+kmK.label+')', value:fmt(kmK.gwp,0)},
            {label:'Füllmenge', value:fmt(kgK,2)+' kg'}
          ],
          note:'CO₂-Äquivalent = Füllmenge × GWP. Prüfintervalle nach F-Gase-Verordnung (EU) 2024/573: ab 5 t jährlich, ab 50 t halbjährlich, ab 500 t vierteljährlich; hermetisch geschlossene Systeme erst ab 10 t. Arbeiten am Kältekreis nur mit Sachkundenachweis (Kat. I/II); R290 ist brennbar (A3) — Aufstellvorgaben beachten.' };
      }
      default: return { main:null, subs:[], note:'' };
    }
  }

  // ---------- DOM-Hilfen ----------
  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    if (attrs) {
      for (var k in attrs) {
        if (k === 'style') e.setAttribute('style', attrs[k]);
        else if (k === 'class') e.className = attrs[k];
        else if (k === 'text') e.textContent = attrs[k];
        else if (k.slice(0,2) === 'on' && typeof attrs[k] === 'function') e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
        else e.setAttribute(k, attrs[k]);
      }
    }
    if (children) {
      (Array.isArray(children) ? children : [children]).forEach(function(c){
        if (c == null) return;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
    }
    return e;
  }

  // ---------- Aktionen ----------
  function setTheme(t) { themeChosen = true; state.theme = t; persist(); applyTheme(); render(); }
  function applyTheme() { document.documentElement.setAttribute('data-theme', state.theme); }
  function open(id) { state.view = id; state.query = ''; render(); window.scrollTo(0,0); }

  function toggleGroup(c) { state.collapsed[c] = !state.collapsed[c]; persist(); renderHomeGroups(); }
  function setField(id, key, val) {
    if (!state.vals[id]) state.vals[id] = {};

  }

  // ---------- Datensicherung: Export/Import als JSON ----------
  function exportData() {
    var data = { app:'shk-rechner', version:1, theme:state.theme, vals:state.vals };
    var url = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type:'application/json' }));
    var a = el('a', { href:url, download:'shk-rechner-daten.json' });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function importData() {
    var inp = el('input', { type:'file', accept:'.json,application/json', style:'display:none;' });
    inp.addEventListener('change', function(){
      var file = inp.files && inp.files[0];
      if (!file) return;
      var rd = new FileReader();
      rd.onload = function(){
        try {
          var d = JSON.parse(rd.result);
          if (!d || typeof d !== 'object' || d.app !== 'shk-rechner' || typeof d.vals !== 'object') {
            throw new Error('format');
          }
          state.vals = d.vals || {};
          if (d.theme === 'light' || d.theme === 'dark') { state.theme = d.theme; themeChosen = true; }
          persist(); applyTheme(); render();
        } catch (e) {
          alert('Import fehlgeschlagen: Die Datei ist keine gültige SHK-Rechner-Sicherung.');
        }
      };
      rd.readAsText(file);
    });
    document.body.appendChild(inp); inp.click(); document.body.removeChild(inp);
  }

  // ---------- App-Datei speichern/teilen (für Handy & Tablet) ----------
  function buildAppHtml() {
    // Sauberen Klon erzeugen: gerendertes UI und Theme-Attribut entfernen,
    // damit die gespeicherte Datei frisch startet (Skript baut alles neu auf).
    var clone = document.documentElement.cloneNode(true);

  function saveApp() {
    var html = buildAppHtml();
    var blob = new Blob([html], { type:'text/html' });
    // Auf Mobilgeräten das Teilen-Menü anbieten (Dateien-App, Drive, Mail …)
    if (navigator.canShare && window.File) {
      try {
        var file = new File([blob], 'SHK Rechner.html', { type:'text/html' });
        if (navigator.canShare({ files:[file] })) {
          navigator.share({ files:[file], title:'SHK Rechner' }).catch(function(){ /* vom Nutzer abgebrochen */ });
          return;
        }
      } catch (e) { /* Fallback unten */ }

    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ---------- PDF-Export (eigener, abhängigkeitsfreier Generator, Helvetica/WinAnsi) ----------
  function pdfText(s) {
    var rep = {'Δ':'d','π':'pi','√':'sqrt','₀':'0','₁':'1','₂':'2','₃':'3','ₑ':'e','ⁿ':'n',
      '→':'->','…':'...','≤':'<=','≥':'>=','„':'"','“':'"','”':'"','‚':"'",'‘':"'",'’':"'",
      '–':'-','—':'-','−':'-','•':'-','€':'EUR','≈':'~','β':'beta','ρ':'rho'};
    s = String(s); var out = '';
    for (var i = 0; i < s.length; i++) {
      var ch = s[i];
      if (rep[ch] != null) { out += rep[ch]; continue; }
      var cc = ch.charCodeAt(0);
      out += (cc < 0x80 || (cc >= 0xA0 && cc <= 0xFF)) ? ch : '?';
    }
    return out;
  }
  function pdfEsc(s) { return pdfText(s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
  function pdfWrap(text, max) {
    var words = String(text).split(/\s+/), lines = [], cur = '';
    words.forEach(function(w){ if ((cur+' '+w).trim().length > max) { if (cur) lines.push(cur); cur = w; } else cur = (cur?cur+' ':'')+w; });
    if (cur) lines.push(cur); return lines;
  }
  function buildPdf(doc) {
    var W = 595.28, H = 841.89, M = 50, y = H - 60, c = '';
    function gray(g){ c += g+' '+g+' '+g+' rg\n'; }
    function t(x, yy, sz, f, str){ c += 'BT /'+f+' '+sz+' Tf 1 0 0 1 '+x.toFixed(2)+' '+yy.toFixed(2)+' Tm ('+pdfEsc(str)+') Tj ET\n'; }
    gray(0); t(M, y, 18, 'F2', doc.title); y -= 22;
    if (doc.subtitle) { gray(0.45); t(M, y, 10, 'F1', doc.subtitle); y -= 20; }
    doc.rows.forEach(function(r){
      if (r.sep) { gray(0.8); c += M.toFixed(2)+' '+(y+6).toFixed(2)+' m '+(W-M).toFixed(2)+' '+(y+6).toFixed(2)+' l 0.5 w S\n'; y -= 10; return; }
      if (r.head) { gray(0.45); t(M, y, 9, 'F2', String(r.head).toUpperCase()); y -= 16; return; }
      if (r.main) { gray(0); t(M, y, 14, 'F2', r.label); t(W-M-170, y, 14, 'F2', r.value); y -= 22; return; }
      gray(0.3); t(M, y, 11, 'F1', r.label); gray(0); t(W-M-190, y, 11, 'F1', r.value); y -= 16;
    });
    if (doc.note) { y -= 6; gray(0.45); pdfWrap(doc.note, 95).forEach(function(ln){ t(M, y, 9, 'F1', ln); y -= 12; }); }
    var stream = c, objs = [];
    objs.push('<< /Type /Catalog /Pages 2 0 R >>');
    objs.push('<< /Type /Pages /Kids [3 0 R] /Count 1 >>');
    objs.push('<< /Type /Page /Parent 2 0 R /MediaBox [0 0 '+W.toFixed(2)+' '+H.toFixed(2)+'] /Resources << /Font << /F1 5 0 R /F2 6 0 R >> >> /Contents 4 0 R >>');
    objs.push('<< /Length '+stream.length+' >>\nstream\n'+stream+'\nendstream');
    objs.push('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>');
    objs.push('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>');
    var pdf = '%PDF-1.4\n%\xE2\xE3\xCF\xD3\n', offs = [];
    objs.forEach(function(o, i){ offs.push(pdf.length); pdf += (i+1)+' 0 obj\n'+o+'\nendobj\n'; });
    var xref = pdf.length;
    pdf += 'xref\n0 '+(objs.length+1)+'\n0000000000 65535 f \n';
    offs.forEach(function(o){ pdf += ('0000000000'+o).slice(-10)+' 00000 n \n'; });
    pdf += 'trailer\n<< /Size '+(objs.length+1)+' /Root 1 0 R >>\nstartxref\n'+xref+'\n%%EOF';
    return pdf;
  }
  function downloadPdf(name, bytes) {
    var arr = new Uint8Array(bytes.length);
    for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i) & 0xff;
    var url = URL.createObjectURL(new Blob([arr], { type:'application/pdf' }));
    var a = el('a', { href:url, download:name });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function buildToolPdfDoc(id) {
    var tool = TOOLS.find(function(t){ return t.id === id; });
    var ev = effVals(id);
    if (id === 'einheiten') {
      var list = ev.kategorie==='temperatur' ? ['°C','°F','K'] : (UNITS[ev.kategorie]?UNITS[ev.kategorie].units.map(function(u){return u[0];}):[]);
      if (list.indexOf(ev.einheit) < 0) ev.einheit = list[0];
    }
    var rows = [{ head:'Eingaben' }];
    if (id === 'rohrvol') {
      rohrSections().forEach(function(s, i){
        rows.push({ label:'Abschnitt '+(i+1)+' (Innen-Ø)', value: fmt(P(s.di),1)+' mm × '+fmt(P(s.len),2)+' m' });
      });
    } else if (id === 'heizlast') {
      var h = ensureHeizlast();
      var std = STANDARDS.find(function(s){ return s.id === h.standard; });
      rows.push({ label:'Baujahr / Standard', value: std ? std.label : String(h.standard) });
      rows.push({ label:'Raumhöhe', value: fmt(P(h.hoehe),2)+' m' });
      h.rooms.forEach(function(r, i){ rows.push({ label:(r.name||('Raum '+(i+1))), value: fmt(P(r.flaeche),1)+' m²' }); });
    } else {
      fieldDefs(id, ev).forEach(function(f){
        var val = ev[f.key];
        if (f.type === 'select' && f.options) {
          var opt = f.options.find(function(o){ return String(Array.isArray(o)?o[0]:o) === String(val); });
          if (opt) val = Array.isArray(opt) ? opt[1] : opt;
        }
        rows.push({ label:f.label, value: String(val)+(f.unit?' '+f.unit:'') });
      });
    }
    rows.push({ sep:true }, { head:'Ergebnis' });
    var res = computeFor(id, ev);
    if (res.main) rows.push({ main:true, label:res.main.label, value:res.main.value+' '+res.main.unit });
    (res.subs || []).forEach(function(r){ rows.push({ label:r.label, value:r.value }); });
    if (res.refs && res.refs.length) {
      rows.push({ head: res.refTitle || 'Richtwerte' });
      res.refs.forEach(function(r){ rows.push({ label:r.label, value:r.value }); });
    }
    return {
      title: tool.name,
      subtitle: cats[tool.cat].label + ' · SHK Rechner · ' + new Date().toLocaleDateString('de-DE'),
      rows: rows,
      note: res.note || ''
    };
  }
  function downloadCurrentPdf() {
    if (state.view === 'home') return;
    var tool = TOOLS.find(function(t){ return t.id === state.view; });
    var name = ('SHK ' + tool.name).replace(/[\\/:*?"<>|]+/g, '-') + '.pdf';
    downloadPdf(name, buildPdf(buildToolPdfDoc(state.view)));
  }

  // Geräteabhängige Anleitung: App-Symbol auf dem Startbildschirm anlegen
  function renderHomeHint() {
    var ua = navigator.userAgent;
    var isIOS = /iPhone|iPad|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    var isAndroid = /Android/.test(ua);
    var current = isIOS ? 'ios' : (isAndroid ? 'android' : 'desktop');
    var steps = [
      { id:'android', title:'Android (Chrome)',      text:'Datei in Chrome öffnen → Menü ⋮ oben rechts → „Zum Startbildschirm hinzufügen". Es entsteht ein App-Symbol, das den Rechner direkt öffnet.' },
      { id:'ios',     title:'iPhone / iPad (Safari)', text:'Seite in Safari öffnen (aus der Dateien-Vorschau heraus geht es nicht — z. B. über einen Cloud-Link oder eine App wie „Documents") → Teilen-Symbol → „Zum Home-Bildschirm".' },
      { id:'desktop', title:'PC (Chrome / Edge)',     text:'Browser-Menü → „Speichern und teilen" bzw. „Weitere Tools" → „Verknüpfung erstellen" — oder eine Datei-Verknüpfung auf den Desktop legen.' }
    ];
    steps.sort(function(a, b){ return (a.id===current ? -1 : 0) - (b.id===current ? -1 : 0); });
    var det = el('details', { class:'tool-explain home-hint' });
    det.appendChild(el('summary', { text:'Zum Startbildschirm anheften — so geht\'s' }));
    var body = el('div', { class:'tool-explain-body' });
    steps.forEach(function(s){
      body.appendChild(el('div', { class:'hint-step' }, [
        el('strong', { text: s.title + (s.id===current ? ' — dieses Gerät' : '') }),
        el('div', { text: s.text })
      ]));
    });
    det.appendChild(body);
    return det;
  }

  function renderHomeGroups() {
    var wrap = document.getElementById('home-groups');
    if (!wrap) return;
    wrap.innerHTML = '';
    var q = state.query.trim().toLowerCase();
    var match = function(t) {
      return !q || t.name.toLowerCase().indexOf(q) >= 0 || t.desc.toLowerCase().indexOf(q) >= 0 || cats[t.cat].label.toLowerCase().indexOf(q) >= 0;
    };
    var any = false;
    ['heizung','wp','solar','sanitaer','allg'].forEach(function(c){
      var tools = TOOLS.filter(function(t){ return t.cat===c && match(t); });
      if (!tools.length) return;
      any = true;
      // Bei aktiver Suche immer aufgeklappt zeigen
      var isCollapsed = !q && !!state.collapsed[c];
      var head = el('button', {
        class:'group-head' + (isCollapsed ? ' collapsed' : ''),
        'aria-expanded': String(!isCollapsed),
        title: isCollapsed ? 'Kategorie aufklappen' : 'Kategorie zuklappen',
        onClick:function(){ toggleGroup(c); }
      }, [
        el('span', { class:'group-dot', style:'background:'+cats[c].dot+';' }),
        el('span', { class:'group-label', text:cats[c].label }),
        el('span', { class:'group-count', text:String(tools.length) }),
        el('span', { class:'group-chev', text:'▾', 'aria-hidden':'true' })
      ]);
      var children = [head];
      if (!isCollapsed) {
        var grid = el('div', { class:'grid' });
        tools.forEach(function(t){
          grid.appendChild(el('button', { class:'card', style:'--cat:'+cats[c].dot+';', onClick:function(){ open(t.id); } }, [
            el('div', { class:'card-name', text:t.name }),
            el('div', { class:'card-desc', text:t.desc })
          ]));
        });
        children.push(grid);
      }
      wrap.appendChild(el('div', { class:'group' }, children));
    });
    if (!any) wrap.appendChild(el('div', { class:'no-results', text:'Kein Rechner gefunden.' }));
  }

  // ---------- Rohrvolumen: dynamische Abschnitte ----------
  function rohrSections() {
    var v = state.vals.rohrvol;
    if (!v || !Array.isArray(v.sections)) {
      var seed;
      if (v && (v.di != null || v.len != null)) {           // Migration alter Einzelwerte
        seed = [{ di: v.di != null ? v.di : 20, len: v.len != null ? v.len : 10 }];
      } else {
        seed = DEFAULTS.rohrvol.sections.map(function(s){ return { di:s.di, len:s.len }; });
      }
      state.vals.rohrvol = { sections: seed };
    }
    return state.vals.rohrvol.sections;
  }
  function setRohrSection(idx, key, val) {
    var secs = rohrSections();
    if (secs[idx]) { secs[idx][key] = val; persist(); renderResult('rohrvol'); }
  }
  function rebuildRohr() {
    var wrap = document.getElementById('tool-fields');
    if (wrap) buildFields('rohrvol', wrap);
    renderResult('rohrvol');
  }
  function addRohrSection() { rohrSections().push({ di:16, len:5 }); persist(); rebuildRohr(); }
  function removeRohrSection(idx) {
    var secs = rohrSections();
    if (secs.length > 1) { secs.splice(idx, 1); persist(); rebuildRohr(); }
  }
  function buildRohrvolFields(wrap) {
    var secs = rohrSections();
    secs.forEach(function(s, idx){
      var head = el('div', { class:'rohr-section-head' }, [
        el('span', { class:'rohr-section-title', text:'Abschnitt ' + (idx+1) }),
        secs.length > 1 ? el('button', { class:'rohr-remove', text:'Entfernen', onClick:function(){ removeRohrSection(idx); } }) : null
      ]);
      var di = el('input', { type:'number', step:'any', inputmode:'decimal', value: s.di != null ? String(s.di) : '', 'aria-label':'Innendurchmesser Abschnitt '+(idx+1)+' in mm' });
      di.addEventListener('input', function(e){ setRohrSection(idx, 'di', e.target.value); });
      var len = el('input', { type:'number', step:'any', inputmode:'decimal', value: s.len != null ? String(s.len) : '', 'aria-label':'Länge Abschnitt '+(idx+1)+' in m' });
      len.addEventListener('input', function(e){ setRohrSection(idx, 'len', e.target.value); });
      var row = el('div', { class:'rohr-row' }, [
        el('div', { class:'field' }, [ el('div', { class:'field-head' }, [ el('span', { class:'field-label', text:'Innendurchmesser' }), el('span', { class:'field-unit', text:'mm' }) ]), di ]),
        el('div', { class:'field' }, [ el('div', { class:'field-head' }, [ el('span', { class:'field-label', text:'Länge' }), el('span', { class:'field-unit', text:'m' }) ]), len ])
      ]);
      wrap.appendChild(el('div', { class:'rohr-section' }, [head, row]));
    });
    wrap.appendChild(el('button', { class:'rohr-add', text:'+ Abschnitt hinzufügen', onClick:addRohrSection }));
  }

  // ---------- Heizlast: gemeinsame Felder + dynamische Räume ----------
  function ensureHeizlast() {
    var v = state.vals.heizlast;
    if (!v || !Array.isArray(v.rooms)) {
      state.vals.heizlast = {
        standard: (v && v.standard) || DEFAULTS.heizlast.standard,
        hoehe: (v && v.hoehe != null) ? v.hoehe : DEFAULTS.heizlast.hoehe,
        rooms: DEFAULTS.heizlast.rooms.map(function(r){ return { name:r.name, flaeche:r.flaeche }; })
      };
    }
    return state.vals.heizlast;
  }
  function setHeizlastShared(key, val) { var h = ensureHeizlast(); h[key] = val; persist(); renderResult('heizlast'); }
  function setHeizlastRoom(idx, key, val) { var h = ensureHeizlast(); if (h.rooms[idx]) { h.rooms[idx][key] = val; persist(); renderResult('heizlast'); } }
  function rebuildHeizlast() { var w = document.getElementById('tool-fields'); if (w) buildFields('heizlast', w); renderResult('heizlast'); }
  function addHeizlastRoom() { ensureHeizlast().rooms.push({ name:'', flaeche:10 }); persist(); rebuildHeizlast(); }
  function removeHeizlastRoom(idx) { var h = ensureHeizlast(); if (h.rooms.length > 1) { h.rooms.splice(idx, 1); persist(); rebuildHeizlast(); } }
  function buildHeizlastFields(wrap) {
    var h = ensureHeizlast();
    // Gemeinsam: Baujahr/Standard
    var sel = el('select', { 'aria-label':'Baujahr / Standard' });
    STANDARDS.forEach(function(s){ var o = el('option', { value:s.id, text:s.label }); if (s.id === h.standard) o.selected = true; sel.appendChild(o); });
    sel.addEventListener('change', function(e){ setHeizlastShared('standard', e.target.value); });
    wrap.appendChild(el('div', { class:'field' }, [ el('div', { class:'field-head' }, [ el('span', { class:'field-label', text:'Baujahr / Standard' }) ]), sel ]));
    // Gemeinsam: Raumhöhe
    var hin = el('input', { type:'number', step:'any', inputmode:'decimal', value: h.hoehe != null ? String(h.hoehe) : '', 'aria-label':'Raumhöhe in m' });
    hin.addEventListener('input', function(e){ setHeizlastShared('hoehe', e.target.value); });
    wrap.appendChild(el('div', { class:'field' }, [ el('div', { class:'field-head' }, [ el('span', { class:'field-label', text:'Raumhöhe' }), el('span', { class:'field-unit', text:'m' }) ]), hin ]));
    // Räume
    h.rooms.forEach(function(r, idx){
      var head = el('div', { class:'rohr-section-head' }, [
        el('span', { class:'rohr-section-title', text:'Raum ' + (idx+1) }),
        h.rooms.length > 1 ? el('button', { class:'rohr-remove', text:'Entfernen', onClick:function(){ removeHeizlastRoom(idx); } }) : null
      ]);
      var name = el('input', { type:'text', value: r.name != null ? String(r.name) : '', placeholder:'Bezeichnung', 'aria-label':'Bezeichnung Raum '+(idx+1) });
      name.addEventListener('input', function(e){ setHeizlastRoom(idx, 'name', e.target.value); });
      var fl = el('input', { type:'number', step:'any', inputmode:'decimal', value: r.flaeche != null ? String(r.flaeche) : '', 'aria-label':'Fläche Raum '+(idx+1)+' in m²' });
      fl.addEventListener('input', function(e){ setHeizlastRoom(idx, 'flaeche', e.target.value); });
      var row = el('div', { class:'hz-row' }, [
        el('div', { class:'field' }, [ el('div', { class:'field-head' }, [ el('span', { class:'field-label', text:'Raum' }) ]), name ]),
        el('div', { class:'field' }, [ el('div', { class:'field-head' }, [ el('span', { class:'field-label', text:'Fläche' }), el('span', { class:'field-unit', text:'m²' }) ]), fl ])
      ]);
      wrap.appendChild(el('div', { class:'rohr-section' }, [head, row]));
    });
    wrap.appendChild(el('button', { class:'rohr-add', text:'+ Raum hinzufügen', onClick:addHeizlastRoom }));
  }

  function buildFields(id, wrap) {
    wrap.innerHTML = '';
    if (id === 'rohrvol') { buildRohrvolFields(wrap); return; }
    if (id === 'heizlast') { buildHeizlastFields(wrap); return; }
    var ev = effVals(id);
    // Einheiten-Spezialfall: Einheit auf gültigen Wert zwingen
    if (id === 'einheiten') {
      var list = ev.kategorie==='temperatur' ? ['°C','°F','K'] : (UNITS[ev.kategorie]?UNITS[ev.kategorie].units.map(function(u){return u[0];}):[]);
      if (list.indexOf(ev.einheit) < 0) ev.einheit = list[0];
    }
    var defs = fieldDefs(id, ev);
    defs.forEach(function(f){
      var head = el('div', { class:'field-head' }, [
        el('span', { class:'field-label', text:f.label }),
        f.unit ? el('span', { class:'field-unit', text:f.unit }) : null
      ]);
      var control;
      var curVal = ev[f.key] != null ? String(ev[f.key]) : '';
      if (f.type === 'select') {
        control = el('select', { 'aria-label':f.label });
        (f.options || []).forEach(function(o){
          var val = Array.isArray(o) ? String(o[0]) : String(o);
          var lab = Array.isArray(o) ? o[1] : String(o);
          var opt = el('option', { value:val, text:lab });
          if (val === curVal) opt.selected = true;
          control.appendChild(opt);
        });
        control.addEventListener('change', function(e){
          setField(id, f.key, e.target.value);
          // Kategorie-Wechsel verändert die Einheit-Optionen → Felder neu bauen
          if (id === 'einheiten' && f.key === 'kategorie') buildFields(id, wrap);
          // Bauart-Wechsel verändert die Eingabefelder → neu bauen
          if (id === 'hkleistung' && f.key === 'bauart') buildFields(id, wrap);
          // Heizkörpertyp setzt einen Richtwert für den Exponenten n → Felder neu bauen
          if (id === 'heizkoerper' && f.key === 'typ' && HKTYP[e.target.value]) {
            setField(id, 'n', HKTYP[e.target.value].n);
            buildFields(id, wrap);
          }
          // Vergleichsheizung setzt Richtwerte für Preis und Wirkungsgrad (bleiben bearbeitbar)
          if (id === 'jaz' && f.key === 'vergleich' && VERGLEICH[e.target.value]) {
            setField(id, 'brennstoff', VERGLEICH[e.target.value].preis);
            setField(id, 'eta', VERGLEICH[e.target.value].eta);
            buildFields(id, wrap);
          }
          // Heizflächentyp setzt einen Richtwert für den Exponenten n (Heizkurve)
          if (id === 'heizkurve' && f.key === 'typ' && HKTYP[e.target.value]) {
            setField(id, 'n', HKTYP[e.target.value].n);
            buildFields(id, wrap);
          }
          // Gebäudetyp wechselt die Eingabefelder (WW-Speicher)
          if (id === 'wwspeicher' && f.key === 'gebaeude') buildFields(id, wrap);
          // Prüfverfahren wechselt die Eingabefelder (Dichtheitsprüfung)
          if (id === 'druckpruef' && f.key === 'verfahren') buildFields(id, wrap);
        });
      } else {
        control = el('input', { type:'number', step:'any', inputmode:'decimal', value:curVal, 'aria-label':f.label + (f.unit ? ' in ' + f.unit : '') });
        control.addEventListener('input', function(e){ setField(id, f.key, e.target.value); });
      }
      wrap.appendChild(el('div', { class:'field' }, [head, control]));
    });
  }

  function renderResult(id) {
    var wrap = document.getElementById('tool-result');
    if (!wrap) return;
    var ev = effVals(id);
    if (id === 'einheiten') {
      var list = ev.kategorie==='temperatur' ? ['°C','°F','K'] : (UNITS[ev.kategorie]?UNITS[ev.kategorie].units.map(function(u){return u[0];}):[]);
      if (list.indexOf(ev.einheit) < 0) ev.einheit = list[0];
    }
    var res = computeFor(id, ev);
    wrap.innerHTML = '';

    if (res.main) {
      wrap.appendChild(el('div', { class:'result-main' }, [
        el('div', { class:'result-main-label', text:res.main.label }),
        el('div', { class:'result-main-row' }, [
          el('span', { class:'result-main-value', text:res.main.value }),
          el('span', { class:'result-main-unit', text:res.main.unit })
        ])
      ]));
    }
    if (res.subs && res.subs.length) {
      var subs = el('div', { class:'result-subs' });
      res.subs.forEach(function(r){
        subs.appendChild(el('div', { class:'result-sub' }, [
          el('span', { class:'result-sub-label', text:r.label }),
          el('span', { class:'result-sub-value', text:r.value })
        ]));
      });
      wrap.appendChild(subs);
    }
    if (res.note) wrap.appendChild(el('div', { class:'result-note', text:res.note }));

    if (res.refs && res.refs.length) {
      wrap.appendChild(el('div', { class:'result-ref-title', text: res.refTitle || 'Richtwerte' }));
      var refs = el('div', { class:'result-subs' });
      res.refs.forEach(function(r){
        refs.appendChild(el('div', { class:'result-sub' }, [
          el('span', { class:'result-sub-label', text:r.label }),
          el('span', { class:'result-sub-value', text:r.value })
        ]));
      });
      wrap.appendChild(refs);
    }
  }

  // ---------- Haupt-Render ----------
  function render() {
    var app = document.getElementById('app');
    app.innerHTML = '';
    app.appendChild(renderHeader());

    if (state.view === 'home') {
      app.appendChild(renderHome());
      renderHomeGroups();
    } else {
      var toolWrap = el('div', { class:'tool-wrap' });
      toolWrap.appendChild(renderTool(state.view));
      app.appendChild(toolWrap);
      renderResult(state.view);
    }
  }

  // ---------- Init ----------
  loadState();
  applyTheme();
  render();

  // Systemeinstellung Hell/Dunkel live verfolgen, solange nichts explizit gewählt wurde
  if (window.matchMedia) {
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    var onSchemeChange = function (e) {
      if (!themeChosen) { state.theme = e.matches ? 'dark' : 'light'; applyTheme(); render(); }
    };
    if (mq.addEventListener) mq.addEventListener('change', onSchemeChange);
    else if (mq.addListener) mq.addListener(onSchemeChange);
  }
})();
</script>

// Service Worker registrieren — macht die App nach dem ersten Besuch komplett offline nutzbar
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js'); });
}
</script>
